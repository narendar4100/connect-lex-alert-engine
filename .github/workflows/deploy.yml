name: Terraform

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*.tf'
      - 'envs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    # Run on pushes to main OR on pull requests
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6" # Unified version

      # Dynamically sets the environment context to 'dev' on push/PR, or uses the manual input
      - name: Set Environment Context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Skip manual zip
        run: echo "Using Terraform data.archive_file to build Lambda ZIP; no manual packaging required."

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ env.TARGET_ENV }}/backend.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=envs/${{ env.TARGET_ENV }}/terraform.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan # Fixed path string to match your execution workspace folder root

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6" # MATCHES PLAN JOB VERSION

      - name: Set Environment Context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Skip manual zip
        run: echo "Using Terraform data.archive_file to build Lambda ZIP; no manual packaging required."

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ env.TARGET_ENV }}/backend.hcl

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
