name: Terraform

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*.tf'
      - 'envs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Set Environment Context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ env.TARGET_ENV }}/backend.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=envs/${{ env.TARGET_ENV }}/terraform.tfvars -out=tfplan

      # FIXED: Uploads BOTH the binary tfplan AND the freshly zipped lambda file together
      - name: Upload Deployment Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-assets
          path: |
            tfplan
            incident_alert_lambda.zip

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Set Environment Context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
          fi

      # FIXED: Downloads both files into the workspace root folder
      - name: Download Deployment Artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-assets
          path: .

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ env.TARGET_ENV }}/backend.hcl

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
